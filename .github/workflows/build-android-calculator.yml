name: Build calculator Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/calculator-wrapper/**"
      - "apps/calculator/**"
      - ".github/workflows/build-android-calculator.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"
          cache-provider: basic

      - name: Build installable debug APK
        working-directory: android/calculator-wrapper
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Name APK
        run: cp android/calculator-wrapper/app/build/outputs/apk/debug/app-debug.apk calculator-webview.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: calculator-android-apk
          path: calculator-webview.apk
          if-no-files-found: error
          retention-days: 30

name: Build calculator Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/calculator-wrapper/**"
      - ".github/workflows/build-android-calculator.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: calculator-android-apk
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"
          cache-provider: basic

      - name: Build installable debug APK
        working-directory: android/calculator-wrapper
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Name APK
        run: cp android/calculator-wrapper/app/build/outputs/apk/debug/app-debug.apk calculator-webview.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: calculator-android-apk
          path: calculator-webview.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish APK for GitHub Pages
        run: |
          mkdir -p downloads
          cp calculator-webview.apk downloads/calculator-webview.apk
          sha256sum downloads/calculator-webview.apk > downloads/calculator-webview.sha256.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/calculator-webview.apk downloads/calculator-webview.sha256.txt

          if git diff --cached --quiet; then
            echo "Published APK is already current."
            exit 0
          fi

          git commit -m "Publish calculator Android APK"
          git push origin HEAD:main

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest main branch
        uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy site with APK
        id: deployment
        uses: actions/deploy-pages@v4

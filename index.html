<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#111827">
  <title>Mobile Apps</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #111827;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      padding: max(28px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(32px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, .18), transparent 32rem),
        #f4f7fb;
    }
    main { width: min(100%, 900px); margin: 0 auto; }
    .eyebrow { margin: 0 0 10px; color: #2563eb; font-size: .78rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(2rem, 8vw, 4rem); line-height: .98; letter-spacing: -.055em; }
    .intro { max-width: 640px; margin: 20px 0 36px; color: #4b5563; font-size: 1.06rem; line-height: 1.65; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 270px), 1fr)); gap: 18px; }
    .card {
      display: block;
      padding: 24px;
      border: 1px solid rgba(148, 163, 184, .28);
      border-radius: 24px;
      background: rgba(255, 255, 255, .82);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 18px 50px rgba(15, 23, 42, .08);
      backdrop-filter: blur(18px);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 22px 60px rgba(15, 23, 42, .13); }
    .card:focus-visible { outline: 3px solid #2563eb; outline-offset: 4px; }
    .icon { display: grid; place-items: center; width: 54px; height: 54px; margin-bottom: 34px; border-radius: 17px; background: #111827; color: white; font-size: 1.45rem; font-weight: 800; }
    h2 { margin: 0 0 8px; font-size: 1.35rem; }
    .card p { margin: 0; color: #64748b; line-height: 1.55; }
    .meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
    .tag { padding: 6px 9px; border-radius: 999px; background: #e8eef8; color: #334155; font-size: .73rem; font-weight: 700; }
    @media (prefers-color-scheme: dark) {
      :root { background: #080d18; color: #f8fafc; }
      body { background: radial-gradient(circle at top left, rgba(59, 130, 246, .18), transparent 32rem), #080d18; }
      .intro { color: #a6b1c2; }
      .card { background: rgba(15, 23, 42, .78); border-color: rgba(148, 163, 184, .18); }
      .card p { color: #9aa8bc; }
      .icon { background: #f8fafc; color: #111827; }
      .tag { background: #182338; color: #cbd5e1; }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Mobile Apps Creator</p>
    <h1>Small apps.<br>Ready to use.</h1>
    <p class="intro">A catalog of static, phone-first applications that can run locally, install as web apps, or be shared through GitHub Pages.</p>

    <section class="grid" aria-label="Available applications">
      <a class="card" href="./apps/calculator/">
        <span class="icon" aria-hidden="true">±</span>
        <h2>Calculator</h2>
        <p>A focused four-function calculator with keyboard support and offline installation.</p>
        <span class="meta">
          <span class="tag">PWA</span>
          <span class="tag">Offline</span>
          <span class="tag">No dependencies</span>
        </span>
      </a>
    </section>
  </main>
</body>
</html>
